<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>栄養素データベース | Nutrition Database</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js" integrity="sha512-xpXUCbrkyJCwC5noJXZqec9rSXdRgFfDoL7Q9/pCPe54Y04OlqwPobMcNuA5NPJ7DRR51OIr6xcOH2wUspyKDQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f8f9fa;color:#333;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
header h1{font-size:16px;font-weight:700;white-space:nowrap;color:#2c3e50}
header h1 span{color:#888;font-weight:400;font-size:12px;margin-left:4px}
.search-box{flex:1;max-width:360px;position:relative}
.search-box input{width:100%;padding:6px 12px 6px 32px;border:1px solid #ddd;border-radius:20px;font-size:13px;outline:none;transition:border-color .2s}
.search-box input:focus{border-color:#5b9bd5}
.search-box::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.header-controls{display:flex;gap:8px;align-items:center;margin-left:auto}
.header-controls select,.header-controls button{padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;cursor:pointer}
.header-controls button:hover{background:#f0f0f0}
.header-controls button.active{background:#5b9bd5;color:#fff;border-color:#5b9bd5}
.main{display:flex;flex:1;overflow:hidden;position:relative}
.left-panel{width:200px;background:#fff;border-right:1px solid #e0e0e0;padding:12px;overflow-y:auto;flex-shrink:0}
.left-panel h3{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px;margin:12px 0 6px;padding-bottom:4px;border-bottom:1px solid #eee}
.left-panel h3:first-child{margin-top:0}
.filter-group label{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:13px;cursor:pointer}
.filter-group label:hover{color:#5b9bd5}
.filter-group input[type=checkbox]{accent-color:#5b9bd5}
.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0}
.reverse-section{margin-top:16px}
.reverse-btn{width:100%;padding:8px;margin:4px 0;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;cursor:pointer;text-align:left;transition:all .2s}
.reverse-btn:hover{background:#f0f7ff;border-color:#5b9bd5}
.reverse-btn.active{background:#5b9bd5;color:#fff;border-color:#5b9bd5}
.reverse-input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;margin:4px 0;outline:none;display:none}
.reverse-input.show{display:block}
.tag-chips{display:none;flex-wrap:wrap;gap:3px;margin:4px 0;max-height:100px;overflow-y:auto}
.tag-chips.show{display:flex}
.tag-chip{font-size:10px;padding:2px 6px;border-radius:10px;background:#f5f5f5;color:#666;cursor:pointer;white-space:nowrap;border:1px solid #e0e0e0;transition:all .15s}
.tag-chip:hover{background:#e3f2fd;border-color:#90caf9;color:#1565c0}
.tag-chip.active{background:#5b9bd5;color:#fff;border-color:#5b9bd5}
.tag-group-label{font-size:9px;color:#aaa;padding:2px 4px;width:100%;flex-shrink:0}
.reverse-sort{display:none;align-items:center;gap:4px;margin:4px 0}
.reverse-sort.show{display:flex}
.reverse-sort select{font-size:10px;padding:2px 4px;border:1px solid #ddd;border-radius:4px;flex:1}
.reverse-sort label{font-size:10px;color:#999;white-space:nowrap}
.reverse-results{font-size:11px;color:#666;margin-top:4px;max-height:200px;overflow-y:auto}
.reverse-results .result-item{padding:4px 6px;border-radius:4px;cursor:pointer;margin:2px 0}
.reverse-results .result-item:hover{background:#f0f7ff}
.reverse-results .result-group{font-size:9px;color:#999;font-weight:600;margin:6px 0 2px;padding:2px 0;border-bottom:1px solid #eee}
.reverse-highlight-btn{font-size:10px;padding:2px 8px;border:1px solid #5b9bd5;border-radius:4px;background:#fff;color:#5b9bd5;cursor:pointer;margin:4px 0;width:100%;transition:all .15s}
.reverse-highlight-btn:hover{background:#5b9bd5;color:#fff}
.graph-container{flex:1;position:relative;background:#fafbfc}
#cy{width:100%;height:100%}
.legend{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);border-radius:8px;padding:8px 12px;font-size:11px;box-shadow:0 1px 4px rgba(0,0,0,.1);display:flex;gap:12px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-line{width:24px;height:2px;display:inline-block}
.right-panel{position:absolute;right:0;top:0;bottom:0;width:300px;background:#fff;border-left:1px solid #e0e0e0;overflow-y:auto;transform:translateX(100%);transition:transform .25s ease;z-index:15}
.right-panel.open{transform:translateX(0)}
.detail-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border:none;background:#f0f0f0;border-radius:50%;font-size:18px;line-height:32px;text-align:center;cursor:pointer;color:#666;z-index:1}
.detail-close:hover{background:#e0e0e0;color:#333}
.detail-header{padding:16px;padding-right:48px;border-bottom:1px solid #eee;position:relative}
.detail-header .cat-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;color:#fff;margin-bottom:6px}
.detail-header h2{font-size:18px;margin-bottom:2px}
.detail-header .name-en{font-size:12px;color:#999}
.detail-header .desc{font-size:12px;color:#666;margin-top:8px;line-height:1.5}
.detail-section{padding:12px 16px;border-bottom:1px solid #f0f0f0}
.detail-section h4{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.detail-section .info-row{font-size:12px;color:#555;margin:4px 0;line-height:1.5}
.detail-section .tag{display:inline-block;background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:11px;margin:2px;color:#555}
.detail-section .tag.deficiency{background:#fff3e0;color:#e65100}
.detail-section .tag.excess{background:#fce4ec;color:#c62828}
.food-item{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid #f8f8f8}
.food-item:last-child{border-bottom:none}
.food-name{color:#333}
.food-amount{color:#999;font-size:11px}
.relation-item{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;border-radius:4px;padding:4px 6px}
.relation-item:hover{background:#f0f7ff}
.relation-type{font-size:10px;padding:1px 6px;border-radius:8px;color:#fff;flex-shrink:0}
.relation-type.synergy{background:#4caf50}
.relation-type.absorption{background:#2196f3}
.relation-type.antagonist{background:#f44336}
.stat-bar{height:4px;background:#eee;border-radius:2px;margin-top:4px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .3s}
.tooltip{position:absolute;background:rgba(44,62,80,.9);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;pointer-events:none;z-index:100;white-space:nowrap;display:none}
@media(max-width:900px){.left-panel{width:160px}.right-panel{width:260px}}
.evidence-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;margin-left:4px;font-weight:600}
.evidence-badge.established{background:#e8f5e9;color:#2e7d32}
.evidence-badge.probable{background:#fff8e1;color:#f57f17}
.evidence-badge.limited{background:#fce4ec;color:#c62828;border:1px dashed #e57373}
.evidence-note{font-size:10px;color:#999;line-height:1.4;margin-top:6px;padding-top:6px;border-top:1px solid #eee}
.disclaimer{position:absolute;bottom:12px;right:12px;background:rgba(255,255,255,.92);border-radius:8px;padding:6px 10px;font-size:10px;color:#999;box-shadow:0 1px 4px rgba(0,0,0,.1);max-width:280px;line-height:1.4}
.legend-evidence{display:flex;gap:8px;margin-left:12px;padding-left:12px;border-left:1px solid #ddd}
.mobile-toggle{display:none;position:fixed;bottom:16px;left:16px;z-index:20;width:44px;height:44px;border-radius:50%;background:#5b9bd5;color:#fff;border:none;font-size:20px;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
@media(max-width:640px){.left-panel{position:fixed;left:-260px;top:0;bottom:0;width:240px;z-index:25;box-shadow:2px 0 8px rgba(0,0,0,.15);transition:left .25s ease}.left-panel.open{left:0}.right-panel{width:100%}.mobile-toggle{display:block}.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:24}.mobile-overlay.show{display:block}}
</style>
</head>
<body>
<header>
  <h1>栄養素データベース<span>46 Essential Nutrients</span></h1>
  <div class="search-box"><input type="text" id="searchInput" placeholder="栄養素を検索（日本語 / English）..."></div>
  <div class="header-controls">
    <select id="layoutSelect">
      <option value="cluster">クラスター</option>
      <option value="concentric">同心円</option>
      <option value="subcategory" selected>サブカテゴリ</option>
      <option value="force">フォース</option>
    </select>
    <button id="fitBtn" title="全体表示">全体表示</button>
    <a href="checker.html" style="padding:5px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;background:#fff;color:#555;text-decoration:none;white-space:nowrap">バランスチェッカー</a>
  </div>
</header>
<div class="main">
  <div class="left-panel">
    <h3>カテゴリ</h3>
    <div class="filter-group" id="catFilters">
      <label><input type="checkbox" checked data-cat="vitamin"><span class="color-dot" style="background:#e67e22"></span>ビタミン (18)</label>
      <label><input type="checkbox" checked data-cat="mineral"><span class="color-dot" style="background:#27ae60"></span>ミネラル (20)</label>
      <label><input type="checkbox" checked data-cat="aminoAcid"><span class="color-dot" style="background:#8e44ad"></span>アミノ酸 (8)</label>
    </div>
    <h3>サブカテゴリ</h3>
    <div class="filter-group" id="subFilters">
      <label><input type="checkbox" checked data-sub="脂溶性"><span class="color-dot" style="background:#e67e22"></span>脂溶性ビタミン</label>
      <label><input type="checkbox" checked data-sub="水溶性"><span class="color-dot" style="background:#3498db"></span>水溶性ビタミン</label>
      <label><input type="checkbox" checked data-sub="主要ミネラル"><span class="color-dot" style="background:#27ae60"></span>主要ミネラル</label>
      <label><input type="checkbox" checked data-sub="微量ミネラル"><span class="color-dot" style="background:#16a085"></span>微量ミネラル</label>
      <label><input type="checkbox" checked data-sub="必須アミノ酸"><span class="color-dot" style="background:#8e44ad"></span>必須アミノ酸</label>
    </div>
    <h3>エビデンス</h3>
    <div class="filter-group" id="evidenceFilters">
      <label><input type="checkbox" checked data-ev="established"><span class="color-dot" style="background:#2e7d32"></span>確立 (36)</label>
      <label><input type="checkbox" checked data-ev="probable"><span class="color-dot" style="background:#f57f17;border:1px dashed #f57f17"></span>有力 (2)</label>
      <label><input type="checkbox" checked data-ev="limited"><span class="color-dot" style="background:#fff;border:1px dashed #c62828"></span>限定的 (8)</label>
    </div>
    <h3>エッジ表示</h3>
    <div class="filter-group" id="edgeFilters">
      <label><input type="checkbox" checked data-edge="synergy"><span class="legend-line" style="background:#4caf50"></span>相乗</label>
      <label><input type="checkbox" checked data-edge="absorption"><span class="legend-line" style="background:#2196f3;border-top:2px dashed #2196f3;height:0"></span>吸収促進</label>
      <label><input type="checkbox" checked data-edge="antagonist"><span class="legend-line" style="background:#f44336;border-top:2px dotted #f44336;height:0"></span>拮抗</label>
    </div>
    <div class="reverse-section">
      <h3>逆引き検索</h3>
      <button class="reverse-btn" id="foodSearchBtn">食材 → 栄養素</button>
      <input type="text" class="reverse-input" id="foodSearchInput" placeholder="食材名を入力 or 下から選択...">
      <div class="tag-chips" id="foodTags"></div>
      <div class="reverse-sort" id="foodSort"><label>並び:</label><select id="foodSortSelect"><option value="default">検索順</option><option value="category">カテゴリ別</option><option value="subcategory">サブカテゴリ別</option><option value="name">五十音順</option></select></div>
      <button class="reverse-highlight-btn" id="foodHighlightBtn" style="display:none">グラフ上でハイライト</button>
      <div class="reverse-results" id="foodResults"></div>
      <button class="reverse-btn" id="symptomSearchBtn">症状 → 栄養素</button>
      <input type="text" class="reverse-input" id="symptomSearchInput" placeholder="症状を入力 or 下から選択...">
      <div class="tag-chips" id="symptomTags"></div>
      <div class="reverse-sort" id="symptomSort"><label>並び:</label><select id="symptomSortSelect"><option value="default">検索順</option><option value="category">カテゴリ別</option><option value="subcategory">サブカテゴリ別</option><option value="name">五十音順</option></select></div>
      <button class="reverse-highlight-btn" id="symptomHighlightBtn" style="display:none">グラフ上でハイライト</button>
      <div class="reverse-results" id="symptomResults"></div>
    </div>
  </div>
  <div class="graph-container">
    <div id="cy"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-line" style="background:#4caf50"></span>相乗</div>
      <div class="legend-item"><span class="legend-line" style="background:#2196f3;border-top:2px dashed #2196f3;height:0"></span>吸収促進</div>
      <div class="legend-item"><span class="legend-line" style="background:#f44336;border-top:2px dotted #f44336;height:0"></span>拮抗</div>
      <div class="legend-evidence">
        <div class="legend-item"><span class="color-dot" style="background:#2e7d32;border:2px solid #2e7d32"></span>確立</div>
        <div class="legend-item"><span class="color-dot" style="background:#fff;border:2px solid #f57f17"></span>有力</div>
        <div class="legend-item"><span class="color-dot" style="background:#fff;border:2px dashed #c62828"></span>限定的</div>
      </div>
    </div>
    <div class="disclaimer">※ 食品成分値は日本食品標準成分表等を参考にした概算値です。エビデンスレベルは主要な学術機関の評価に基づきます。掲載情報は一般的な参考情報であり、診断・治療・疾病予防を目的としません。</div>
  </div>
  <div class="right-panel" id="detailPanel">
    <button class="detail-close" id="detailClose">&times;</button>
    <div class="detail-content"></div>
  </div>
</div>
<div class="tooltip" id="tooltip"></div>
<button class="mobile-toggle" id="mobileToggle">☰</button>
<div class="mobile-overlay" id="mobileOverlay"></div>

<script>
// ============================================================
// DATA: 46 Essential Nutrients
// ============================================================
const nutrients = [
  // === VITAMINS: Fat-soluble (脂溶性) ===
  {id:"vitA",name:"ビタミンA",nameEn:"Vitamin A",category:"vitamin",subCategory:"脂溶性",unit:"μgRAE",rda:"650〜900",deficiency:"夜盲症、角膜乾燥症、皮膚乾燥、免疫力低下、成長障害",excess:"頭痛、吐き気、肝障害、骨粗鬆症リスク、催奇形性",foods:[{name:"鶏レバー",amount:"14,000μg/100g"},{name:"うなぎ蒲焼",amount:"1,500μg/100g"},{name:"にんじん",amount:"720μg/100g"},{name:"ほうれん草",amount:"350μg/100g"},{name:"かぼちゃ",amount:"330μg/100g"}],description:"視覚・皮膚・粘膜の健康維持に必須。β-カロテンから体内変換される。抗酸化作用、免疫機能の維持に重要。"},
  {id:"vitD",name:"ビタミンD",nameEn:"Vitamin D",category:"vitamin",subCategory:"脂溶性",unit:"μg",rda:"8.5",deficiency:"くる病（小児）、骨軟化症、骨粗鬆症、免疫力低下",excess:"高カルシウム血症、腎障害、食欲不振、嘔吐",foods:[{name:"しらす干し",amount:"61μg/100g"},{name:"紅鮭",amount:"33μg/100g"},{name:"さんま",amount:"16μg/100g"},{name:"干し椎茸",amount:"17μg/100g"},{name:"卵黄",amount:"5.9μg/100g"}],description:"カルシウム・リンの吸収を促進し骨の健康を維持。日光浴で皮膚から合成される。免疫調節作用も注目されている。"},
  {id:"vitE",name:"ビタミンE",nameEn:"Vitamin E",category:"vitamin",subCategory:"脂溶性",unit:"mg",rda:"5.0〜7.0",deficiency:"溶血性貧血、神経障害、筋力低下、不妊",excess:"出血傾向（稀）、筋力低下",foods:[{name:"アーモンド",amount:"31mg/100g"},{name:"ひまわり油",amount:"39mg/100g"},{name:"かぼちゃ",amount:"5.1mg/100g"},{name:"ほうれん草",amount:"2.1mg/100g"},{name:"アボカド",amount:"3.3mg/100g"}],description:"強力な抗酸化作用で細胞膜を酸化ストレスから保護。血行促進、老化防止。ビタミンCにより再生される。"},
  {id:"vitK",name:"ビタミンK",nameEn:"Vitamin K",category:"vitamin",subCategory:"脂溶性",unit:"μg",rda:"150",deficiency:"出血傾向、骨粗鬆症、新生児出血症",excess:"報告はほとんどない",foods:[{name:"納豆",amount:"600μg/100g"},{name:"モロヘイヤ",amount:"640μg/100g"},{name:"小松菜",amount:"210μg/100g"},{name:"ほうれん草",amount:"270μg/100g"},{name:"ブロッコリー",amount:"160μg/100g"}],description:"血液凝固に必須の因子。骨へのカルシウム定着を促進するオステオカルシンの活性化にも関与。腸内細菌でも産生される。"},

  // === VITAMINS: Water-soluble (水溶性) ===
  {id:"vitB1",name:"ビタミンB1",nameEn:"Vitamin B1 (Thiamine)",category:"vitamin",subCategory:"水溶性",unit:"mg",rda:"1.1〜1.4",deficiency:"脚気、ウェルニッケ脳症、倦怠感、食欲不振、神経障害",excess:"過剰症の報告は稀",foods:[{name:"豚ヒレ肉",amount:"1.32mg/100g"},{name:"うなぎ蒲焼",amount:"0.75mg/100g"},{name:"玄米",amount:"0.41mg/100g"},{name:"大豆",amount:"0.83mg/100g"},{name:"落花生",amount:"0.85mg/100g"}],description:"糖質代謝に不可欠な補酵素。エネルギー産生、神経機能の維持に重要。アルコール多飲で消耗が増加。"},
  {id:"vitB2",name:"ビタミンB2",nameEn:"Vitamin B2 (Riboflavin)",category:"vitamin",subCategory:"水溶性",unit:"mg",rda:"1.2〜1.6",deficiency:"口角炎、口内炎、舌炎、皮膚炎、成長障害",excess:"過剰症の報告は稀（尿が黄色くなる）",foods:[{name:"豚レバー",amount:"3.60mg/100g"},{name:"うなぎ蒲焼",amount:"0.74mg/100g"},{name:"納豆",amount:"0.56mg/100g"},{name:"牛乳",amount:"0.15mg/100g"},{name:"卵",amount:"0.43mg/100g"}],description:"脂質・タンパク質・糖質の代謝に関与する補酵素。皮膚・粘膜の健康維持。「発育のビタミン」とも呼ばれる。"},

// Size nodes by degree (connection count)
function sizeByDegree(){
  cy.nodes().forEach(n => {
    const deg = n.degree();
    const sz = Math.max(28, Math.min(56, 24 + deg * 4));
    n.style('width', sz);
    n.style('height', sz);
  });
}

// ============================================================
// LAYOUTS
// ============================================================
function applyLayout(name){
  let opts;
  switch(name){
    case 'cluster':
      opts = {
        name:'cose',
        nodeRepulsion:8000,
        idealEdgeLength:120,
        edgeElasticity:100,
        gravity:0.3,
        numIter:500,
        animate:true,
        animationDuration:600,
        randomize:false
      };
      // Group by category
      const groups = {vitamin:{x:0,y:0},mineral:{x:400,y:0},aminoAcid:{x:200,y:350}};
      cy.nodes().forEach(n=>{
        const g = groups[n.data('category')] || {x:200,y:200};
        n.position({x:g.x + (Math.random()-0.5)*200, y:g.y + (Math.random()-0.5)*200});
      });
      opts.randomize = false;
      break;
    case 'concentric':
      opts = {
        name:'concentric',
        concentric:n=>n.degree(),
        levelWidth:()=>2,
        minNodeSpacing:40,
        animate:true,
        animationDuration:600
      };
      break;
    case 'subcategory':
      opts = {name:'preset',animate:true,animationDuration:600};
      const subGroups = {'脂溶性':{x:0,y:0},'水溶性':{x:300,y:0},'主要ミネラル':{x:600,y:0},'微量ミネラル':{x:150,y:350},'必須アミノ酸':{x:450,y:350}};
      cy.nodes().forEach(n=>{
        const sg = subGroups[n.data('subCategory')] || {x:300,y:175};
        const sameGroup = cy.nodes().filter(m=>m.data('subCategory')===n.data('subCategory'));
        const idx = sameGroup.indexOf(n);
        const cols = Math.ceil(Math.sqrt(sameGroup.length));
        const row = Math.floor(idx/cols);
        const col = idx % cols;
        n.position({x:sg.x + col*60, y:sg.y + row*60});
      });
      break;
    case 'force':
    default:
      opts = {
        name:'cose',
        nodeRepulsion:6000,
        idealEdgeLength:100,
        edgeElasticity:80,
        gravity:0.25,
        numIter:800,
        animate:true,
        animationDuration:600,
        randomize:true
      };
      break;
  }
  cy.layout(opts).run();
  setTimeout(sizeByDegree, 700);
}

function showDetail(nodeId){
  const d = nutrients.find(x=>x.id===nodeId);
  if(!d) return;
  const c = COLORS[d.subCategory];
  // Find connected edges
  const node = cy.getElementById(nodeId);
  const connEdges = node.connectedEdges();
  const relations = [];
  connEdges.forEach(edge=>{
    const ed = edges.find((_,i)=>'e'+i===edge.id());
    if(!ed) return;
    const otherId = ed.source===nodeId?ed.target:ed.source;
    const other = nutrients.find(x=>x.id===otherId);
    if(other) relations.push({...ed, otherName:other.name, otherId});
  });

  let foodsHtml = d.foods.map(f=>`<div class="food-item"><span class="food-name">${f.name}</span><span class="food-amount">${f.amount}</span></div>`).join('');
  let defTags = d.deficiency.split('、').map(s=>`<span class="tag deficiency">${s}</span>`).join('');
  let exTags = d.excess.split('、').map(s=>`<span class="tag excess">${s}</span>`).join('');
  let relHtml = relations.map(r=>`<div class="relation-item" data-node="${r.otherId}"><span class="relation-type ${r.type}">${EDGE_LABELS[r.type]}</span><span>${r.otherName}</span></div>`).join('') || '<div class="info-row" style="color:#bbb">接続なし</div>';

  const ev = EVIDENCE_LABELS[EVIDENCE[d.id]||'established'];
  const evBadge = `<span class="evidence-badge ${EVIDENCE[d.id]||'established'}">${ev.label}</span>`;
  const evNote = EVIDENCE[d.id]==='limited' ? `<div class="evidence-note">⚠ この栄養素はヒトでの必須性に関するエビデンスが限定的です。「ビタミン様物質」や「超微量元素」に分類され、公的な摂取基準は設定されていません。</div>` : EVIDENCE[d.id]==='probable' ? `<div class="evidence-note">△ 日本では食事摂取基準に含まれていますが、国際的には必須性の評価が分かれています。</div>` : '';

  detailContent.innerHTML = `
    <div class="detail-header">
      <span class="cat-badge" style="background:${c.bg}">${d.subCategory}</span>${evBadge}
      <h2>${d.name}</h2>
      <div class="name-en">${d.nameEn}</div>
      <div class="desc">${d.description}</div>
      ${evNote}
    </div>
    <div class="detail-section">
      <h4>基本情報</h4>
      <div class="info-row">エビデンス: <span style="color:${ev.color};font-weight:600">${ev.label}</span> — ${ev.desc}</div>
      <div class="info-row">単位: ${d.unit}</div>
      <div class="info-row">推奨量(成人): ${d.rda}</div>
    </div>
    <div class="detail-section">
      <h4>欠乏症</h4>
      <div>${defTags}</div>
    </div>
    <div class="detail-section">
      <h4>過剰症</h4>
      <div>${exTags}</div>
    </div>
    <div class="detail-section">
      <h4>含有食材 (上位)</h4>
      ${foodsHtml}
    </div>
    <div class="detail-section">
      <h4>関連栄養素 (${relations.length})</h4>
      ${relHtml}
    </div>
    <div style="font-size:10px;color:#aaa;padding:10px 16px;line-height:1.5;border-top:1px solid #f0f0f0">
      ※ 欠乏・過剰に関する情報は一般的な参考情報です。診断・治療・疾病予防を目的とするものではありません。個別の判断は専門職にご相談ください。<br>
      <!-- TODO Phase 1b: 相関エッジの根拠レベル・出典を個別レビューする -->
    </div>
  `;
  detailPanel.classList.add('open');

  // Click on relation item to navigate
  detailContent.querySelectorAll('.relation-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const nid = el.dataset.node;
      cy.nodes().unselect();
      const target = cy.getElementById(nid);
      target.select();
      cy.animate({center:{eles:target},zoom:1.5,duration:400});
      highlightNode(nid);
      showDetail(nid);
    });
  });
}

function highlightNode(nodeId){

  neighborhood.addClass('highlighted');
  node.removeClass('dimmed');
}

const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  cy.nodes().removeClass('searchMatch dimmed');

  const matches = cy.nodes().filter(n=>{

function applyFilters(){
  const catChecked = [...document.querySelectorAll('#catFilters input:checked')].map(i=>i.dataset.cat);
  const subChecked = [...document.querySelectorAll('#subFilters input:checked')].map(i=>i.dataset.sub);
  const evChecked = [...document.querySelectorAll('#evidenceFilters input:checked')].map(i=>i.dataset.ev);
  const edgeChecked = [...document.querySelectorAll('#edgeFilters input:checked')].map(i=>i.dataset.edge);

  cy.nodes().forEach(n=>{
    const d = nutrients.find(x=>x.id===n.id());
    if(!d){n.addClass('hidden');return;}
    const catOk = catChecked.includes(d.category);
    const subOk = subChecked.includes(d.subCategory);
    const evOk = evChecked.includes(EVIDENCE[d.id]||'established');
    if(catOk && subOk && evOk) n.removeClass('hidden');
    else n.addClass('hidden');
  });

  cy.edges().forEach(e=>{
    const t = e.data('edgeType');
    if(edgeChecked.includes(t)){
      e.removeClass('hidden');
    } else {
      e.addClass('hidden');
    }
    // Also hide if source or target is hidden
    if(e.source().hasClass('hidden') || e.target().hasClass('hidden')){
      e.addClass('hidden');
    }
  });
}

document.querySelectorAll('#catFilters input, #subFilters input, #evidenceFilters input, #edgeFilters input').forEach(cb=>{
  cb.addEventListener('change', applyFilters);
});

function highlightMultipleNodes(nodeIds){
  cy.elements().removeClass('highlighted dimmed searchMatch');
  if(nodeIds.length === 0) return;
  const matchNodes = cy.nodes().filter(n=>nodeIds.includes(n.id()));
  cy.elements().not(matchNodes).addClass('dimmed');
  matchNodes.addClass('searchMatch');
  cy.fit(matchNodes, 40);
}

const CAT_ORDER = {vitamin:0,mineral:1,aminoAcid:2};
const CAT_LABEL = {vitamin:'ビタミン',mineral:'ミネラル',aminoAcid:'アミノ酸'};

function sortResults(matches, mode, keyNutrient){
  const arr = [...matches];
  switch(mode){
    case 'category':
      arr.sort((a,b)=>(CAT_ORDER[a[keyNutrient].category]||0)-(CAT_ORDER[b[keyNutrient].category]||0));
      break;
    case 'subcategory':
      arr.sort((a,b)=>(a[keyNutrient].subCategory||'').localeCompare(b[keyNutrient].subCategory||''));
      break;
    case 'name':
      arr.sort((a,b)=>a[keyNutrient].name.localeCompare(b[keyNutrient].name,'ja'));
      break;
  }
  return arr;
}

function renderGrouped(container, matches, mode, keyNutrient, renderItem){
  container.innerHTML = '';
  if(matches.length === 0){
    container.innerHTML = '<div style="padding:4px;color:#999">該当なし</div>';
    return;
  }
  const grouped = mode === 'category' || mode === 'subcategory';
  let lastGroup = null;
  matches.forEach(m=>{
    if(grouped){
      const grp = mode==='category' ? CAT_LABEL[m[keyNutrient].category] : m[keyNutrient].subCategory;
      if(grp !== lastGroup){
        const hdr = document.createElement('div');
        hdr.className = 'result-group';
        hdr.textContent = grp;
        container.appendChild(hdr);
        lastGroup = grp;
      }
    }
    container.appendChild(renderItem(m));
  });
}

// Extract popular food tags from data
(function buildFoodTags(){
  const foodCount = {};
  nutrients.forEach(n=>n.foods.forEach(f=>{
    const name = f.name.replace(/（.*）/g,'').trim();
    if(name==='含有'||name==='高含有'||name==='微量') return;
    foodCount[name] = (foodCount[name]||0) + 1;
  }));
  // Group by category
  const foodGroups = {'肉・レバー':[],'魚介':[],'野菜':[],'豆・種実':[],'乳・卵':[],'穀物':[],'果物':[],'海藻':[],'その他':[]};
  const classify = name => {
    if(/レバー|肉|ささみ/.test(name)) return '肉・レバー';
    if(/魚|鮭|さんま|まぐろ|かつお|しじみ|あさり|牡蠣|しらす|たらこ|たら|しゃこ|いわし|貝/.test(name)) return '魚介';
    if(/ほうれん草|ブロッコリー|小松菜|にんじん|かぼちゃ|にんにく|玉ねぎ|アスパラガス|トマト|ピーマン|パセリ|モロヘイヤ|枝豆|れんこん|生姜/.test(name)) return '野菜';
    if(/大豆|納豆|アーモンド|落花生|カシューナッツ|ナッツ|豆|高野豆腐|ブラジルナッツ/.test(name)) return '豆・種実';
    if(/卵|牛乳|チーズ|ヨーグルト/.test(name)) return '乳・卵';
    if(/玄米|そば|大麦|全粒|穀物/.test(name)) return '穀物';
    if(/バナナ|キウイ|いちご|レモン|オレンジ|りんご|ぶどう|桃|すいか|メロン|グレープフルーツ|いちじく|柑橘/.test(name)) return '果物';
    if(/昆布|わかめ|ひじき|海苔|海藻|青海苔|あおさ/.test(name)) return '海藻';
    return 'その他';
  };
  Object.keys(foodCount).forEach(name=>{
    const grp = classify(name);
    foodGroups[grp].push({name, count:foodCount[name]});
  });
  Object.keys(foodGroups).forEach(grp=>{
    const items = foodGroups[grp].sort((a,b)=>b.count-a.count);
    if(items.length === 0) return;
    const label = document.createElement('div');
    label.className = 'tag-group-label';
    label.textContent = grp;
    foodTags.appendChild(label);
    items.forEach(item=>{
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = item.name;
      chip.dataset.query = item.name;
      chip.addEventListener('click', ()=>{
        document.querySelectorAll('#foodTags .tag-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        foodSearchInput.value = item.name;
        foodSearchInput.dispatchEvent(new Event('input'));
      });
      foodTags.appendChild(chip);
    });
  });
})();

function doFoodSearch(){
  const q = foodSearchInput.value.trim().toLowerCase();

const symptomSearchBtn = document.getElementById('symptomSearchBtn');
const symptomSearchInput = document.getElementById('symptomSearchInput');

const symptomHighlightBtn = document.getElementById('symptomHighlightBtn');

// Extract symptom keyword tags from data
(function buildSymptomTags(){
  const keywords = {};
  const groups = {'血液・貧血':['貧血','出血','血'],'骨・関節':['骨','くる病','骨軟化','骨粗鬆'],'皮膚・毛髪':['皮膚','脱毛','毛髪','爪','湿疹','白髪'],'神経・精神':['神経','しびれ','うつ','認知','不眠','意識'],'消化器':['下痢','食欲不振','吐き気','嘔吐','便秘'],'免疫':['免疫','感染'],'成長・代謝':['成長障害','代謝','糖尿','血糖'],'疲労・全身':['疲労','倦怠','筋力低下','筋痙攣'],'口腔':['口角炎','口内炎','舌炎','虫歯','歯'],'視覚':['夜盲','視覚','眼']};
  const allSymptoms = [];
  nutrients.forEach(n=>{
    n.deficiency.split('、').forEach(s=>allSymptoms.push(s.replace(/（.*?）/g,'').trim()));
    n.excess.split('、').forEach(s=>allSymptoms.push(s.replace(/（.*?）/g,'').trim()));
  });
  // Count occurrences
  const symCount = {};
  allSymptoms.forEach(s=>{if(s && s.length>1) symCount[s]=(symCount[s]||0)+1});
  // Build tags by group
  Object.entries(groups).forEach(([grp, kws])=>{
    const label = document.createElement('div');
    label.className = 'tag-group-label';
    label.textContent = grp;
    symptomTags.appendChild(label);
    // Find matching symptoms for this group
    const matched = new Set();
    kws.forEach(kw=>{
      Object.keys(symCount).forEach(s=>{
        if(s.includes(kw) && !matched.has(s)) matched.add(s);
      });
    });
    [...matched].sort((a,b)=>(symCount[b]||0)-(symCount[a]||0)).slice(0,6).forEach(s=>{
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.textContent = s;
      chip.addEventListener('click', ()=>{
        document.querySelectorAll('#symptomTags .tag-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        symptomSearchInput.value = s;
        symptomSearchInput.dispatchEvent(new Event('input'));
      });
      symptomTags.appendChild(chip);
    });
  });
})();
